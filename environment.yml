name: alz-gnn
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch and GPU support
  - pytorch::pytorch::*[version='>=2.0']
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision>=0.15.0
  - pytorch::torchaudio>=0.15.0
  # PyTorch Geometric
  - pytorch::pytorch-geometric>=2.3.0
  # Scientific and data processing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0
  - scikit-learn>=1.3.0
  - networkx>=3.2
  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.0.0
  # Development and testing
  - jupyter>=1.0.0
  - jupyterlab>=4.0.0
  - ipykernel>=6.25.0
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  - black>=23.9.0
  - flake8>=6.0.0
  - mypy>=1.5.0
  - isort>=5.12.0
  # Additional scientific packages
  - pyyaml>=6.0
  - requests>=2.31.0
  - tqdm>=4.66.0
  - pydantic>=2.0.0
  # Pip dependencies for packages not in conda
  - pip:
    - optuna>=3.3.0
    - captum>=0.7.0
    - shap>=0.42.0
    - synapseclient>=2.7.0
    - anndata>=0.10.0
    - scanpy>=1.9.0
    - biopython>=1.81
    - python-louvain>=0.16
    - leidenalg>=0.9.1
